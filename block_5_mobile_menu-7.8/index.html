<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<main class="menu">
			<div class="menu__rectangle">
				<div class="menu__rectangle__img">
					<img class="menu__rectangle__burger" src="./img/burger.svg" alt="burger" />
					<img class="menu__rectangle__group" src="./img/Group.svg" alt="Group" />
					<img class="menu__rectangle__search" src="./img/search.svg" alt="search" />
				</div>
				<div class="main__menu">
					<div class="main__menu__span">
						<span class="main__menu__span__first">Ремонт техники</span>
						<span class="main__menu__span__child">Корпоративным клиентам</span>

						<span class="main__menu__span__child">Контакты</span>

						<img class="main__contact_img" src="./img/call.svg" alt="call">
						<img class="main__contact_img" src="./img/chat.svg" alt="chat">
						<img class="main__contact_img" src="./img/profile.svg" alt="profile">
						<span class="main__contact__mail">mail@cps.com</span>
						<span class="main__contact__tell">8 800 890 8900</span>
					</div>
					<div class="menu__lang">
						<span>RU</span>
						<span>EN</span>
						<span>CH</span>

				</div>
			</div>
